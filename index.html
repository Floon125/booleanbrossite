<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Into the Origin</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/6.5.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/6.5.0/firebase-database.js"></script>
<script defer src="index.js"></script>

</head>

<body>

<!-- HERO -->
<section class="hero">
  <img src="Assets/titleScreen.png" class="hero-img">
</section>

<!-- STORY -->
<section class="card fade-in">
  <h1>What is this game?</h1>
  <p>
    Into the Origin is an original indie sci-fi game made by students over a year.
  </p>
</section>

<!-- INPUT -->
<section class="card fade-in">
  <h2>Enter Player ID</h2>
  <input id="playerInput" type="text" placeholder="e.g. 3877" class="input"/>
  <p>(Press Enter)</p>
</section>

<!-- OUTPUT -->
<section class="card fade-in hidden" id="outputBox">

  <pre id="output"></pre>

  <input id="newIdInput" type="text" placeholder="New ID or name" class="input"/>

  <button id="copyBtn">Copy Save</button>

</section>

</body>
</html>
